{% extends "base.html" %}
{% block title %}Borrar recurso{% endblock %}
{% block content %}
<div class="container mt-4">
  <h1>¿Borrar "{{ resource.title }}"?</h1>
  <p>Esta acción no se puede deshacer.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, borrar</button>
    <a href="{% url 'resources:resource_detail' resource.campaign.slug resource.pk %}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
