{% extends "base.html" %}

{% block title %}{{ action }} sesión{% endblock %}

{% block content %}
<div class="container mt-4">
  <h1>{{ action }} sesión en {{ campaign.title }}</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">{{ action }}</button>
    <a href="{% url 'mm_sessions:session_list' campaign.slug %}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
