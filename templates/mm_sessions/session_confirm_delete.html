{% extends "base.html" %}

{% block title %}Borrar sesión{% endblock %}

{% block content %}
<div class="container mt-4">
  <h1>¿Borrar "{{ session.title }}"?</h1>
  <p>Esta acción no se puede deshacer.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, borrar</button>
    <a href="{% url 'mm_sessions:session_detail' session.campaign.slug session.pk %}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
