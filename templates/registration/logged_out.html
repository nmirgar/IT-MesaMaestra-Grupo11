{% extends "base.html" %}

{% block title %}Sesión cerrada | MesaMaestra{% endblock %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="mm-form-card text-center">
            <div class="mm-auth-mark mx-auto mb-3">◆</div>

            <h1>Sesión cerrada</h1>

            <p class="mm-subtle mb-4">
                Has cerrado sesión correctamente. La mesa queda preparada para tu próxima aventura.
            </p>

            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <a href="{% url 'accounts:login' %}" class="btn mm-btn mm-btn-primary">
                    Volver a iniciar sesión
                </a>

                <a href="{% url 'home' %}" class="btn mm-btn mm-btn-outline-dark">
                    Ir al inicio
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
